name: Flutter CI and Deploy
on:  
  push:    
    branches:
     - main
  workflow_dispatch:

permissions:  
 contents: write
jobs:  
 build-and-deploy:    
  runs-on: ubuntu-latest    
  steps:      
  - name: Checkout        
    uses: actions/checkout@v4 
    
  - name: Setup Flutter        
    uses: subosito/flutter-action@v2        
    with:          
       channel: 'stable'          
       cache: true          
       cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"      
  - name: Enable Web        
    run: flutter config --enable-web      
  - name: Install dependencies        
    run: flutter pub get      # Убрали dart format, так как это часто ломает билд без необходимости      
  - name: Analyze project source        
    run: flutter analyze --no-fatal-infos --no-fatal-warnings      
  - name: Create config.json        
    run: |    
        cat > config.json <<EOF
        {            
        "FIREBASE_API_KEY": "${{ secrets.FIREBASE_API_KEY }}",            
        "FIREBASE_APP_ID": "${{ secrets.FIREBASE_APP_ID }}",            
        "FIREBASE_MESSAGING_SENDER_ID": "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",            
        "FIREBASE_PROJECT_ID": "${{ secrets.FIREBASE_PROJECT_ID }}",            
        "FIREBASE_AUTH_DOMAIN": "${{ secrets.FIREBASE_AUTH_DOMAIN }}",            
        "FIREBASE_STORAGE_BUCKET": "${{ secrets.FIREBASE_STORAGE_BUCKET }}",            
        "FIREBASE_MEASUREMENT_ID": "${{ secrets.FIREBASE_MEASUREMENT_ID }}"          
        }
        EOF
        
  - name: Build Web (Optimized for Size & Performance)        # ВАЖНО: Убран флаг --wasm. Он слишком тяжелый для простого приложения.        # --csp: убирает eval() для безопасности и совместимости        # --no-source-maps: уменьшает размер файлов        
    run: flutter build web --release --tree-shake-icons --renderer canvaskit --base-href /${{ github.event.repository.name }}/ --dart-define-from-file=config.json --csp --no-source-maps    

  - name: Deploy to GitHub Pages        
    uses: peaceiris/actions-gh-pages@v4        
    with:          
      github_token: ${{ secrets.GITHUB_TOKEN }}          
      publish_dir: ./build/web          
      force_orphan: true         # Включаем gzip сжатие на уровне действия для еще большей скорости загрузки          
      gzip: true
