name: Flutter CI and Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting with dart format
        run: dart format --output=none .

      - name: Analyze project source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Create config.json
        run: echo '{"FIREBASE_API_KEY":"${{ secrets.FIREBASE_API_KEY }}","FIREBASE_APP_ID":"${{ secrets.FIREBASE_APP_ID }}","FIREBASE_MESSAGING_SENDER_ID":"${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}","FIREBASE_PROJECT_ID":"${{ secrets.FIREBASE_PROJECT_ID }}","FIREBASE_AUTH_DOMAIN":"${{ secrets.FIREBASE_AUTH_DOMAIN }}","FIREBASE_STORAGE_BUCKET":"${{ secrets.FIREBASE_STORAGE_BUCKET }}","FIREBASE_MEASUREMENT_ID":"${{ secrets.FIREBASE_MEASUREMENT_ID }}"}' > config.json

      - name: Build Web
        run: |
          flutter build web --release --renderer auto --base-href="./" --dart-define-from-file=config.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true
