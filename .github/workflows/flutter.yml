name: Flutter CIon:  push:    branches: [ "main" ]  pull_request:    branches: [ "main" ]jobs:  build:    runs-on: ubuntu-latest    steps:      - uses: actions/checkout@v4      - uses: subosito/flutter-action@v2        with:          channel: 'stable'          flutter-version: '3.x'   - name: Enable Web        run: flutter config --enable-web      - name: Install dependencies        run: flutter pub get         - name: Analyze project source        run: flutter analyze      #name: Run tests        run: flutter test                - name: Build Web        run: flutter build web --release
