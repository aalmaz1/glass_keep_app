<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Premium Glassmorphic Notes App">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Glass Keep">

  <!-- Corrected icon paths -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Glass Keep</title>
  <link rel="manifest" href="manifest.json">

  <!-- OpenGraph Meta Tags -->
  <meta property="og:title" content="Glass Keep - Premium Notes">
  <meta property="og:description" content="Elegant glassmorphic note-taking experience with real-time sync.">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta property="og:url" content="https://glass-keep.web.app/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Glass Keep">

  <!-- Twitter Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Glass Keep">
  <meta name="twitter:description" content="Elegant glassmorphic note-taking experience with real-time sync.">
  <meta name="twitter:image" content="icons/Icon-512.png">
  <meta name="twitter:site" content="@glasskeep">

  <!-- Security: HSTS Meta-logic (Upgrade Insecure Requests) -->
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

  <!-- Resource Preloading -->
  <link rel="preload" href="flutter.js" as="script">
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <link rel="preload" href="main.dart.js" as="script">
  <link rel="preload" href="canvaskit/canvaskit.wasm" as="fetch" crossorigin="anonymous">

  <!-- SYSTEM-REBORN-V1.8.0 -->

  <style>
    body {
      background-color: #020204;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading-indicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #020204;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .logo {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, rgba(142, 202, 230, 0.8), rgba(225, 225, 230, 0.8));
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(225, 225, 230, 0.3);
      margin-bottom: 32px;
      animation: pulse 2s ease-in-out infinite;
    }
    .loader {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(142, 202, 230, 0.1);
      border-top: 3px solid #8ECAE6;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <div class="logo"></div>
    <div class="loader"></div>
  </div>

  <script>
    window.addEventListener('load', function() {
      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }

      // Listen for Flutter's first frame
      window.addEventListener('flutter-first-frame', function() {
        var loader = document.getElementById('loading-indicator');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(function() {
            loader.remove();
          }, 600);
        }
      });
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
