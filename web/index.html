<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Elegant glassmorphic note-taking experience with real-time sync.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Glass Keep">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Glass Keep</title>
  <link rel="manifest" href="manifest.json">

  <!-- Theme Color -->
  <meta name="theme-color" content="#020204">

  <!-- OpenGraph Meta Tags -->
  <meta property="og:title" content="Glass Keep - Premium Notes">
  <meta property="og:description" content="Elegant glassmorphic note-taking experience with real-time sync.">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta property="og:url" content="https://glass-keep.web.app/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Glass Keep">

  <!-- Twitter Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Glass Keep">
  <meta name="twitter:description" content="Elegant glassmorphic note-taking experience with real-time sync.">
  <meta name="twitter:image" content="icons/Icon-512.png">
  <meta name="twitter:site" content="@glasskeep">

  <!-- Security: HSTS Meta-logic (Upgrade Insecure Requests) -->
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

  <!-- Resource Preloading -->
  <link rel="preload" href="flutter.js" as="script">
  <link rel="preload" href="main.dart.js" as="script">
  <link rel="preload" href="canvaskit/canvaskit.wasm" as="fetch" crossorigin="anonymous">

  <style>
    body {
      background-color: #020204;
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #loading-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-in-out;
    }
    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #8ECAE6 0%, #E1E1E6 100%);
      border-radius: 18px;
      box-shadow: 0 12px 24px rgba(142, 202, 230, 0.25);
      margin-bottom: 32px;
      animation: pulse 2s ease-in-out infinite;
    }
    .loader {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(142, 202, 230, 0.1);
      border-top-color: #8ECAE6;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <div class="logo"></div>
    <div class="loader"></div>
  </div>

  <script>
    window.addEventListener('load', function() {
      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }

      // Listen for Flutter's first frame to hide loader
      window.addEventListener('flutter-first-frame', function() {
        var loader = document.getElementById('loading-indicator');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(function() {
            loader.remove();
          }, 500);
        }
      });
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
