<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Elegant glassmorphic note-taking experience with real-time sync.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Glass Keep">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Glass Keep</title>
  <link rel="manifest" href="manifest.json">

  <!-- Theme Color -->
  <meta name="theme-color" content="#020204">

  <!-- OpenGraph Meta Tags -->
  <meta property="og:title" content="Glass Keep - Premium Notes">
  <meta property="og:description" content="Elegant glassmorphic note-taking experience with real-time sync.">
  <meta property="og:image" content="icons/icon-512.png">
  <meta property="og:url" content="https://glass-keep.web.app/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Glass Keep">

  <!-- Twitter Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Glass Keep">
  <meta name="twitter:description" content="Elegant glassmorphic note-taking experience with real-time sync.">
  <meta name="twitter:image" content="icons/icon-512.png">
  <meta name="twitter:site" content="@glasskeep">

  <!-- Security: HSTS Meta-logic (Upgrade Insecure Requests) -->
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

  <!-- Resource Preloading -->
  <link rel="preload" href="flutter.js" as="script">
  <link rel="preload" href="main.dart.js" as="script">
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <link rel="preload" href="canvaskit/canvaskit.wasm" as="fetch" crossorigin="anonymous">

  <style>
    body {
      background-color: #020204;
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at center, #1a1a2e 0%, #020204 100%);
    }
    #loading-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      padding: 50px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #8ECAE6 0%, #219EBC 100%);
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(142, 202, 230, 0.3);
      margin-bottom: 32px;
      animation: pulse 2.5s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }
    .logo::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: rotate(45deg);
      animation: shimmer 3s infinite;
    }
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(142, 202, 230, 0.1);
      border-top-color: #8ECAE6;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.05); filter: brightness(1.2); }
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%) rotate(45deg); }
      100% { transform: translateX(100%) rotate(45deg); }
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <div class="logo"></div>
    <div class="loader"></div>
  </div>

  <script>
    window.addEventListener('load', function() {
      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }

      // Listen for Flutter's first frame to hide loader
      window.addEventListener('flutter-first-frame', function() {
        var loader = document.getElementById('loading-indicator');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(function() {
            loader.remove();
          }, 500);
        }
      });
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
